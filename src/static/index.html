<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Run Intel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script crossorigin="anonymous" src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
  <style>
    /* ── Reset & Base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A0A0A;
      color: #E0E0E0;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    #root { max-width: 900px; margin: 0 auto; padding: 24px 16px 64px; }

    /* ── Typography ────────────────────────────────────────────── */
    h1, h2, h3 { font-family: 'Outfit', sans-serif; font-weight: 600; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .green { color: #00F19F; }
    .red { color: #FF4D4D; }
    .yellow { color: #FFD600; }
    .dim { color: #666; }
    .text-sm { font-size: 13px; }

    /* ── Cards ──────────────────────────────────────────────────── */
    .card {
      background: #141414;
      border: 1px solid #1E1E1E;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-header h2 { font-size: 16px; letter-spacing: 0.5px; }

    /* ── Two Column Layout ─────────────────────────────────────── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .two-col > .card { margin-bottom: 0; }
    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 24px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left h1 { font-size: 28px; font-weight: 700; }
    .header-left .subtitle {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #666;
      margin-top: 2px;
    }
    .bolt { font-size: 24px; }
    .status {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #666;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #00F19F;
      box-shadow: 0 0 6px #00F19F80;
    }

    /* ── Nav Tabs ────────────────────────────────────────────────── */
    .nav-tabs {
      display: flex;
      gap: 4px;
      background: #141414;
      border: 1px solid #1E1E1E;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
      overflow-x: auto;
    }
    .nav-tab {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: #888;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .nav-tab:hover { color: #E0E0E0; background: #1A1A1A; }
    .nav-tab.active { color: #0A0A0A; background: #00F19F; font-weight: 600; }

    /* ── Form ───────────────────────────────────────────────────── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1.5fr auto;
      gap: 12px;
      align-items: end;
    }
    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr 1fr; }
      .form-grid-3 { grid-template-columns: 1fr 1fr; }
    }
    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      background: #0A0A0A;
      border: 1px solid #2A2A2A;
      border-radius: 8px;
      padding: 10px 12px;
      color: #E0E0E0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: #00F19F; }
    .field input::placeholder { color: #444; }
    .field select option { background: #141414; color: #E0E0E0; }

    .btn {
      background: #00F19F;
      color: #0A0A0A;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; box-shadow: 0 0 16px #00F19F40; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .btn-sm { padding: 6px 16px; font-size: 12px; }
    .btn-outline {
      background: transparent;
      color: #00F19F;
      border: 1px solid #00F19F40;
    }
    .btn-outline:hover { background: #00F19F15; }
    .btn-danger { background: #FF4D4D; }

    /* ── Briefing ───────────────────────────────────────────────── */
    .briefing-card {
      background: #141414;
      border: 1px solid #1E1E1E;
      border-radius: 12px;
      padding: 0;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .briefing-inner {
      border-left: 4px solid var(--briefing-color, #666);
      padding: 28px 28px 24px;
    }
    .briefing-headline {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .briefing-summary {
      font-size: 14px;
      line-height: 1.7;
      color: #999;
      margin-bottom: 20px;
    }
    .briefing-play {
      background: #0A0A0A;
      border: 1px solid #2A2A2A;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 18px;
    }
    .briefing-play-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #00F19F;
      margin-bottom: 6px;
    }
    .briefing-play-text {
      font-size: 14px;
      font-weight: 500;
      color: #E0E0E0;
      line-height: 1.5;
    }
    .briefing-metrics {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .briefing-metric {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #444;
    }

    /* ── Coaching Insight ────────────────────────────────────────── */
    .insight {
      background: linear-gradient(135deg, #0A1F15 0%, #0D2A1A 50%, #0A1F15 100%);
      border: 1px solid #00F19F30;
      border-radius: 10px;
      padding: 20px 24px;
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.7;
      color: #C8EDD9;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px #00F19F10, inset 0 0 20px #00F19F08;
    }
    .insight::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00F19F, transparent);
    }
    .insight .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #00F19F;
      margin-bottom: 8px;
    }

    /* ── Progress Bar ──────────────────────────────────────────── */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #1E1E1E;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    /* ── Metric Row ──────────────────────────────────────────────── */
    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #1E1E1E;
    }
    .metric-row:last-child { border-bottom: none; }
    .metric-label { font-size: 13px; color: #888; }
    .metric-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 500;
    }

    /* ── Shoe Tracker ───────────────────────────────────────────── */
    .shoe-item { margin-bottom: 18px; }
    .shoe-item:last-child { margin-bottom: 0; }
    .shoe-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .shoe-name { font-size: 13px; font-weight: 500; color: #CCC; }
    .shoe-miles {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
    }
    .shoe-track {
      width: 100%;
      height: 8px;
      background: #1E1E1E;
      border-radius: 4px;
      overflow: hidden;
    }
    .shoe-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }
    .shoe-label {
      font-size: 11px;
      margin-top: 4px;
    }

    /* ── Snapshot ────────────────────────────────────────────────── */
    .recovery-hero {
      text-align: center;
      padding: 12px 0 20px;
      border-bottom: 1px solid #1E1E1E;
      margin-bottom: 16px;
    }
    .recovery-hero .big-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
    }
    .recovery-hero .sub-stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 8px;
    }
    .recovery-hero .sub-stat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #888;
    }
    .snap-table { width: 100%; }
    .snap-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 70px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #1E1E1E;
    }
    .snap-row:last-child { border-bottom: none; }
    .snap-row.snap-header {
      border-bottom: 1px solid #2A2A2A;
      padding-bottom: 6px;
      margin-bottom: 2px;
    }
    .snap-label { font-size: 12px; color: #888; }
    .snap-hdr { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #555; text-align: center; }
    .snap-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      text-align: center;
    }
    .snap-delta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      text-align: right;
    }

    /* ── Table ───────────────────────────────────────────────────── */
    .run-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .run-table th {
      text-align: left;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #666;
      padding: 8px 10px;
      border-bottom: 1px solid #1E1E1E;
    }
    .run-table td {
      padding: 10px 10px;
      border-bottom: 1px solid #1E1E1E08;
    }
    .run-table tr:hover td { background: #1A1A1A; }

    /* ── Chart ───────────────────────────────────────────────────── */
    .chart-wrap { position: relative; height: 280px; margin-top: 8px; }

    /* ── VO2 Max Ring ──────────────────────────────────────────── */
    .vo2-ring {
      width: 120px; height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      margin: 0 auto 16px;
    }
    .vo2-ring .big-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }
    .vo2-ring .label {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #888;
      margin-top: 4px;
    }

    /* ── Profile Banner ─────────────────────────────────────────── */
    .profile-banner {
      background: linear-gradient(135deg, #1A1A0A 0%, #1A2A1A 100%);
      border: 1px solid #2A2A1A;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .profile-banner .msg { font-size: 14px; color: #C8D8B9; }

    /* ── Loading ─────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #333;
      border-top-color: #00F19F;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Config ───────────────────────────────────────────────────
    const SHOE_DISPLAY = {
      alphafly: 'Nike Alpha Flys',
      evosl: 'Adidas Evo SL',
      cloudmonster: 'On Cloudmonster 2',
      zoomfly: 'Nike Zoom Fly 6',
    };
    const SHOE_KEYS = Object.keys(SHOE_DISPLAY);
    const SHOE_MAX = 500;

    // ── Helpers ──────────────────────────────────────────────────
    const api = (path, opts) => fetch(path, {
      ...opts,
      headers: { ...(opts?.headers || {}), 'X-Requested-With': 'RunIntel' },
    }).then(r => {
      if (!r.ok) throw new Error(`API ${r.status}`);
      return r.json();
    });

    function getLocalDateString(d = new Date()) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function secToPace(s) {
      if (!s || s <= 0) return 'N/A';
      const m = Math.floor(s / 60);
      const sec = Math.round(s % 60);
      return m + ':' + String(sec).padStart(2, '0');
    }

    function recoveryColor(score) {
      if (score == null) return 'dim';
      if (score >= 67) return 'green';
      if (score >= 34) return 'yellow';
      return 'red';
    }

    function shoeColor(miles) {
      if (miles >= 350) return '#FF4D4D';
      if (miles >= 200) return '#FFD600';
      return '#00F19F';
    }

    function shoeStatus(miles) {
      if (miles >= 350) return 'Replace soon';
      if (miles >= 200) return 'Breaking in';
      return 'Fresh';
    }

    function vo2Category(v) {
      if (v >= 50) return { label: 'Elite', color: '#00F19F' };
      if (v >= 45) return { label: 'Above Average', color: '#00F19F' };
      if (v >= 40) return { label: 'Average', color: '#FFD600' };
      if (v >= 35) return { label: 'Below Average', color: '#FF8C00' };
      return { label: 'Low', color: '#FF4D4D' };
    }

    // ── Components ───────────────────────────────────────────────

    function Header({ tab, setTab }) {
      const tabs = [
        { id: 'dashboard', label: 'Dashboard' },
        { id: 'nutrition', label: 'Nutrition' },
        { id: 'body', label: 'Body Comp' },
        { id: 'longevity', label: 'Longevity' },
        { id: 'settings', label: 'Settings' },
      ];
      return (
        <>
          <div className="header">
            <div className="header-left">
              <span className="bolt green">&#9889;</span>
              <div>
                <h1>Run Intel</h1>
                <div className="subtitle">Personal Performance Optimizer</div>
              </div>
            </div>
            <div className="status">
              <div className="status-dot"></div>
              Connected
            </div>
          </div>
          <div className="nav-tabs">
            {tabs.map(t => (
              <button key={t.id} className={'nav-tab' + (tab === t.id ? ' active' : '')}
                onClick={() => setTab(t.id)}>{t.label}</button>
            ))}
          </div>
        </>
      );
    }

    function formatRecoveryDate(isoDate) {
      if (!isoDate) return null;
      const d = new Date(isoDate + 'T00:00:00');
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[d.getMonth()] + ' ' + d.getDate();
    }

    // ── Weekly Intelligence Components ─────────────────────────────

    function WeeklyScorecardCard({ scorecard }) {
      if (!scorecard || !scorecard.goals || scorecard.goals.length === 0) return null;
      const statusColor = (s) => s === 'on_track' ? '#00F19F' : s === 'building' ? '#FFD600' : s === 'stalling' ? '#FF8C00' : '#FF4D4D';
      const statusLabel = (s) => s === 'on_track' ? 'On track' : s === 'building' ? 'Building' : s === 'stalling' ? 'Stalling' : 'Off track';

      return (
        <div className="card" style={{ padding: '20px 24px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
            <div style={{ fontSize: 11, color: '#00F19F', letterSpacing: 1, textTransform: 'uppercase' }}>This Week</div>
            <div className="dim text-sm">w/e {scorecard.week_ending}</div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${scorecard.goals.length}, 1fr)`, gap: 16, marginBottom: 16 }}>
            {scorecard.goals.map((g, i) => (
              <div key={i} style={{ textAlign: 'center' }}>
                <div className="mono" style={{ fontSize: 20, fontWeight: 700 }}>{g.current}</div>
                <div className="dim text-sm">{g.label} → {g.target}</div>
                <div style={{ fontSize: 12, color: statusColor(g.status), marginTop: 4 }}>{g.trend}</div>
                <div style={{ fontSize: 11, color: statusColor(g.status), fontWeight: 600, marginTop: 2 }}>{statusLabel(g.status)}</div>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#888', borderTop: '1px solid #1E1E1E', paddingTop: 12 }}>
            <span>Cal: {scorecard.nutrition_compliance?.calories_pct || 0}%</span>
            <span>Protein: {scorecard.nutrition_compliance?.protein_pct || 0}%</span>
            <span>Z2: {scorecard.zone2_minutes}/{scorecard.zone2_target} min</span>
            {scorecard.avg_recovery != null && <span>Recovery: {scorecard.avg_recovery}%</span>}
            <span>{scorecard.weekly_miles} mi</span>
          </div>
          <div style={{ fontSize: 13, color: '#CCC', marginTop: 12, textAlign: 'center' }}>{scorecard.headline}</div>
        </div>
      );
    }

    function TodayWorkoutCard({ plan, recovery }) {
      if (!plan || !plan.days) return null;
      const todayStr = getLocalDateString();
      const todayPlan = plan.days.find(d => d.date === todayStr);
      if (!todayPlan) return null;

      const recoveryLow = recovery && recovery.recovery_score != null && recovery.recovery_score < 50;
      const typeColors = { quality: '#FF8C00', long: '#00BFFF', lift_easy: '#00F19F', volume: '#00F19F', shakeout: '#888', rest: '#666' };

      return (
        <div className="card" style={{ padding: '20px 24px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
            <div style={{ fontSize: 11, color: typeColors[todayPlan.type] || '#00F19F', letterSpacing: 1, textTransform: 'uppercase' }}>Today's Workout</div>
            <div className="dim text-sm">{todayPlan.day_label}</div>
          </div>
          <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 12 }}>{todayPlan.title}</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 12 }}>
            {todayPlan.segments.map((seg, i) => (
              <div key={i} style={{ background: '#0A0A0A', borderRadius: 8, padding: '10px 14px', border: '1px solid #1E1E1E' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span style={{ fontSize: 14, color: '#E0E0E0' }}>{seg.description}</span>
                  {seg.hr_target && <span className="mono text-sm dim">HR {seg.hr_target}</span>}
                </div>
              </div>
            ))}
          </div>
          {todayPlan.notes && <div style={{ fontSize: 13, color: '#999', marginBottom: 8 }}>{todayPlan.notes}</div>}
          {recoveryLow && todayPlan.recovery_adjustment && (
            <div style={{ background: '#2A1A00', border: '1px solid #FF8C00', borderRadius: 8, padding: '10px 14px', fontSize: 13, color: '#FF8C00' }}>
              Recovery is {recovery.recovery_score}% — {todayPlan.recovery_adjustment}
            </div>
          )}
        </div>
      );
    }

    function WeekOverviewStrip({ plan, runs }) {
      if (!plan || !plan.days) return null;
      const todayStr = getLocalDateString();
      const runDates = new Set((runs || []).map(r => r.date));

      return (
        <div className="card" style={{ padding: '16px 20px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <div style={{ fontSize: 11, color: '#888', letterSpacing: 1, textTransform: 'uppercase' }}>Week Plan</div>
            <div className="dim text-sm">Target: {plan.weekly_miles_target} mi</div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 6, textAlign: 'center' }}>
            {plan.days.map((d, i) => {
              const isToday = d.date === todayStr;
              const isPast = d.date < todayStr;
              const hasRun = runDates.has(d.date);
              const icon = isPast ? (hasRun ? '\u2713' : '\u2013') : isToday ? '\u25B6' : '\u25CB';
              const color = isPast ? (hasRun ? '#00F19F' : '#666') : isToday ? '#FFD600' : '#444';
              return (
                <div key={i} style={{ padding: '6px 0' }}>
                  <div style={{ fontSize: 11, color: color, fontWeight: isToday ? 700 : 400 }}>{d.day_label.slice(0, 3)}</div>
                  <div style={{ fontSize: 18, color: color, margin: '4px 0' }}>{icon}</div>
                  <div className="mono" style={{ fontSize: 10, color: '#666' }}>{d.total_miles}mi</div>
                  <div style={{ fontSize: 9, color: '#555', marginTop: 2 }}>{d.type === 'quality' ? 'Quality' : d.type === 'long' ? 'Long' : d.type === 'lift_easy' ? 'Lift+Run' : d.type === 'volume' ? 'Volume' : d.type === 'shakeout' ? 'Shakeout' : 'Rest'}</div>
                </div>
              );
            })}
          </div>
          <div style={{ fontSize: 11, color: '#555', textAlign: 'center', marginTop: 8 }}>{plan.generation_context}</div>
        </div>
      );
    }

              <div style={{ fontSize: 12, color: '#FF8C00', marginBottom: 12 }}>{briefing.note}</div>

            <div className="briefing-play">
              <div className="briefing-play-label">Today's Workout</div>
              <div className="briefing-play-text">
                {w ? w.description : briefing.play}
              </div>
              {w && w.rationale && (
                <div style={{ fontSize: 12, color: '#888', marginTop: 6 }}>{w.rationale}</div>

              {m.hrv_today != null && <span className="briefing-metric">HRV {m.hrv_today}</span>}
              {m.rhr_today != null && <span className="briefing-metric">RHR {m.rhr_today}</span>}

    function LogRunCard({ onLogged }) {
      const [dist, setDist] = useState('');
      const [time, setTime] = useState('');
      const [shoe, setShoe] = useState('alphafly');
      const [runDate, setRunDate] = useState(getLocalDateString());
      const [loading, setLoading] = useState(false);
      const [insight, setInsight] = useState(null);

      const submit = async () => {
        if (!dist || !time) return;
        setLoading(true);
        setInsight(null);
        try {
          const res = await api('/api/runs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ distance_miles: parseFloat(dist), time_minutes: parseFloat(time), shoe, date: runDate }),
          });
          if (res.error) {
            setInsight('Error: ' + res.error);
          } else {
            setInsight(res.coaching_insight);
            setDist(''); setTime('');
            if (onLogged) onLogged();
          }
        } catch (e) {
          setInsight('Error logging run.');
          console.error(e);
        }
        setLoading(false);
      };

      return (
        <div className="card">
          <div className="card-header"><h2 className="green">LOG A RUN</h2></div>
          <div className="form-row" style={{ gridTemplateColumns: '1fr 1fr 1fr 1fr auto' }}>
            <div className="field">
              <label>Distance (mi)</label>
              <input type="number" step="0.1" placeholder="6.2" value={dist} onChange={e => setDist(e.target.value)} />
            </div>
            <div className="field">
              <label>Time (min)</label>
              <input type="number" step="0.1" placeholder="48.5" value={time} onChange={e => setTime(e.target.value)} />
            </div>
            <div className="field">
              <label>Shoe</label>
              <select value={shoe} onChange={e => setShoe(e.target.value)}>
                {SHOE_KEYS.map(k => <option key={k} value={k}>{SHOE_DISPLAY[k]}</option>)}
              </select>
            </div>
            <div className="field">
              <label>Date</label>
              <input type="date" value={runDate} onChange={e => setRunDate(e.target.value)} />
            </div>
            <button className="btn" onClick={submit} disabled={loading || !dist || !time}>
              {loading ? <span className="spinner"></span> : 'Log Run'}
            </button>
          </div>
          {insight && (
            <div className="insight">
              <div className="tag">&#9889; Coaching Insight</div>
              <div>{insight}</div>
            </div>
          )}
        </div>
      );
    }

    function ShoeTracker({ shoes }) {
      const mileMap = {};
      SHOE_KEYS.forEach(k => { mileMap[k] = 0; });
      if (shoes) shoes.forEach(s => { if (mileMap.hasOwnProperty(s.name)) mileMap[s.name] = s.miles; });
      return (
        <div className="card">
          <div className="card-header"><h2>SHOE TRACKER</h2></div>
          {SHOE_KEYS.map(k => {
            const miles = mileMap[k];
            const pct = Math.min((miles / SHOE_MAX) * 100, 100);
            const color = shoeColor(miles);
            return (
              <div className="shoe-item" key={k}>
                <div className="shoe-top">
                  <span className="shoe-name">{SHOE_DISPLAY[k]}</span>
                  <span className="shoe-miles" style={{ color }}>{miles.toFixed(1)} mi</span>
                </div>
                <div className="shoe-track">
                  <div className="shoe-fill" style={{ width: pct + '%', background: color }}></div>
                </div>
                <div className="shoe-label" style={{ color: color === '#FF4D4D' ? '#FF4D4D' : '#555' }}>{shoeStatus(miles)}</div>
              </div>
            );
          })}
        </div>
      );
    }

    function SnapshotCard({ snapshot, recovery }) {
      const s7 = snapshot?.last_7d || {};
      const s30 = snapshot?.last_30d || {};
      const rows = [
        { label: 'Avg HR', key: 'avg_hr', unit: ' bpm', lower: true },
        { label: 'Strain', key: 'avg_strain', unit: '', lower: false },
        { label: 'Recovery', key: 'recovery', unit: '%', lower: false },
        { label: 'HRV', key: 'hrv', unit: ' ms', lower: false },
        { label: 'Resting HR', key: 'resting_hr', unit: ' bpm', lower: true },
      ];
      return (
        <div className="card">
          <div className="card-header"><h2>TODAY'S SNAPSHOT</h2></div>
          {recovery && recovery.recovery_score != null && (
            <div className="recovery-hero">
              <div className="dim text-sm" style={{ marginBottom: 4, letterSpacing: '1px', fontSize: 10, textTransform: 'uppercase' }}>Recovery</div>
              <div className={'big-num ' + recoveryColor(recovery.recovery_score)}>{Math.round(recovery.recovery_score)}%</div>
              <div className="sub-stats">
                {recovery.resting_hr != null && <span className="sub-stat">RHR {Math.round(recovery.resting_hr)}</span>}
                {recovery.hrv != null && <span className="sub-stat">HRV {recovery.hrv.toFixed(1)}</span>}
              </div>
            </div>
          )}
          <div className="snap-table">
            <div className="snap-row snap-header">
              <div className="snap-hdr"></div><div className="snap-hdr">7 Day</div><div className="snap-hdr">30 Day</div><div className="snap-hdr" style={{ textAlign: 'right' }}>Delta</div>
            </div>
            {rows.map(r => {
              const v7 = s7[r.key], v30 = s30[r.key];
              if (v7 == null && v30 == null) return null;
              const diff = (v7 != null && v30 != null) ? v7 - v30 : null;
              let deltaClass = 'dim';
              if (diff != null && Math.abs(diff) >= 1) deltaClass = (r.lower ? diff < 0 : diff > 0) ? 'green' : 'red';
              const fmt = (v, key) => v == null ? '\u2014' : (key === 'hrv' ? v.toFixed(1) : Math.round(v)) + r.unit;
              return (
                <div className="snap-row" key={r.key}>
                  <div className="snap-label">{r.label}</div>
                  <div className="snap-val">{fmt(v7, r.key)}</div>
                  <div className="snap-val dim">{fmt(v30, r.key)}</div>
                  <div className={'snap-delta ' + deltaClass}>{diff != null ? (diff > 0 ? '+' : '') + (r.key === 'hrv' ? diff.toFixed(1) : Math.round(diff)) : ''}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function TrendChart({ trends }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      useEffect(() => {
        if (!trends || trends.length === 0) return;
        if (chartRef.current) chartRef.current.destroy();
        const ctx = canvasRef.current.getContext('2d');
        chartRef.current = new Chart(ctx, {
          type: 'line',
          data: {
            labels: trends.map(t => t.date),
            datasets: [
              { label: 'Pace', data: trends.map(t => t.pace_seconds), borderColor: '#00F19F', backgroundColor: '#00F19F15', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#00F19F', borderWidth: 2, yAxisID: 'y' },
              { label: 'Avg HR', data: trends.map(t => t.avg_hr), borderColor: '#FF4D4D', backgroundColor: '#FF4D4D10', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#FF4D4D', borderWidth: 2, yAxisID: 'y1' },
            ],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#888', font: { family: 'Outfit', size: 12 }, usePointStyle: true, pointStyle: 'circle' } },
              tooltip: { backgroundColor: '#1A1A1A', titleColor: '#FFF', bodyColor: '#CCC', borderColor: '#2A2A2A', borderWidth: 1, padding: 12,
                callbacks: { label: ctx => ctx.datasetIndex === 0 ? ' Pace: ' + secToPace(ctx.parsed.y) + '/mi' : ' HR: ' + ctx.parsed.y + ' bpm' } },
            },
            scales: {
              x: { ticks: { color: '#444', maxTicksLimit: 8, font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#1A1A1A' } },
              y: { position: 'left', reverse: true, ticks: { color: '#00F19F80', font: { family: 'JetBrains Mono', size: 11 }, callback: v => secToPace(v) }, grid: { color: '#1A1A1A' }, title: { display: true, text: 'Pace', color: '#00F19F', font: { family: 'Outfit', size: 12 } } },
              y1: { position: 'right', ticks: { color: '#FF4D4D80', font: { family: 'JetBrains Mono', size: 11 } }, grid: { display: false }, title: { display: true, text: 'HR (bpm)', color: '#FF4D4D', font: { family: 'Outfit', size: 12 } } },
            },
          },
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [trends]);
      if (!trends || trends.length === 0) return null;
      return (
        <div className="card">
          <div className="card-header"><h2>PACE vs HEART RATE</h2><span className="text-sm dim">{trends.length} logged runs</span></div>
          <div className="chart-wrap"><canvas ref={canvasRef}></canvas></div>
        </div>
      );
    }

    function RecentRuns({ runs }) {
      if (!runs || runs.length === 0) return null;
      const display = runs.slice(0, 20);
      return (
        <div className="card">
          <div className="card-header"><h2>RECENT RUNS</h2><span className="text-sm dim">{runs.length} total</span></div>
          <div style={{ overflowX: 'auto' }}>
            <table className="run-table">
              <thead><tr><th>Date</th><th>Dist</th><th>Time</th><th>Pace</th><th>HR</th><th>Strain</th><th>Recovery</th><th>Shoe</th></tr></thead>
              <tbody>
                {display.map((r, i) => (
                  <tr key={i}>
                    <td>{r.date || '\u2014'}</td>
                    <td>{r.distance_miles ? parseFloat(r.distance_miles).toFixed(1) : '\u2014'}</td>
                    <td>{r.time_minutes ? parseFloat(r.time_minutes).toFixed(1) : '\u2014'}</td>
                    <td className="green">{r.pace_per_mile || '\u2014'}</td>
                    <td>{r.avg_hr ? Math.round(parseFloat(r.avg_hr)) : '\u2014'}</td>
                    <td>{r.strain ? parseFloat(r.strain).toFixed(1) : '\u2014'}</td>
                    <td className={recoveryColor(r.recovery_score)}>{r.recovery_score != null ? Math.round(r.recovery_score) + '%' : '\u2014'}</td>

        </div>

    // ── Nutrition Tab ─────────────────────────────────────────────
    function NutritionTab({ profile, briefing }) {
      const [logs, setLogs] = useState([]);
      const [calories, setCalories] = useState('');
      const [protein, setProtein] = useState('');
      const [notes, setNotes] = useState('');
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        api('/api/nutrition').then(setLogs).catch(console.error);
      }, []);

      // Use briefing's workout-based budget if available, else fallback
      const nt = briefing?.nutrition_target;
      const targetCals = nt ? nt.calories : (profile ? Math.round(parseFloat(profile.weight_lbs || 180) * 13) : null);
      const targetProtein = nt ? nt.protein_grams : (profile ? Math.round(parseFloat(profile.weight_lbs || 180) * 0.9) : null);

      const todayStr = getLocalDateString();
      const todayLogs = logs.filter(l => l.date === todayStr);
      const todayCals = todayLogs.reduce((s, l) => s + l.calories, 0);
      const todayProtein = todayLogs.reduce((s, l) => s + l.protein_grams, 0);

      // 7-day rolling average
      const last7d = getLocalDateString(new Date(Date.now() - 7 * 86400000));
      const weekLogs = logs.filter(l => l.date >= last7d);
      const uniqueDays7d = [...new Set(weekLogs.map(l => l.date))];
      const weekCals = weekLogs.reduce((s, l) => s + l.calories, 0);
      const weekProtein = weekLogs.reduce((s, l) => s + l.protein_grams, 0);
      const avgCals7d = uniqueDays7d.length > 0 ? Math.round(weekCals / uniqueDays7d.length) : null;
      const avgProtein7d = uniqueDays7d.length > 0 ? Math.round(weekProtein / uniqueDays7d.length) : null;

      // Weekly protein compliance (% of days hitting target)
      const proteinCompliance = (uniqueDays7d.length > 0 && targetProtein) ? (() => {
        const dailyProtein = {};
        weekLogs.forEach(l => { dailyProtein[l.date] = (dailyProtein[l.date] || 0) + l.protein_grams; });
        const hitDays = Object.values(dailyProtein).filter(p => p >= targetProtein).length;
        return Math.round((hitDays / uniqueDays7d.length) * 100);
      })() : null;

      const submit = async () => {
        if (!calories || !protein) return;
        setLoading(true);
        try {
          await api('/api/nutrition', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ calories: parseInt(calories), protein_grams: parseInt(protein), notes: notes || undefined, date: getLocalDateString() }),
          });
          setCalories(''); setProtein(''); setNotes('');
          api('/api/nutrition').then(setLogs).catch(console.error);
        } catch (e) { console.error(e); }
        setLoading(false);
      };

      const deleteEntry = async (id) => {
        await api(`/api/nutrition/${id}`, { method: 'DELETE' });
        setLogs(logs.filter(l => l.id !== id));
      };

      return (
        <>
          {!profile && (
            <div className="profile-banner">
              <span className="msg">Set up your profile to see personalized nutrition targets.</span>
            </div>
          )}
          <div className="card">
            <div className="card-header"><h2 className="green">LOG NUTRITION</h2></div>
            <div className="form-grid-3" style={{ marginBottom: 12 }}>
              <div className="field">
                <label>Calories</label>
                <input type="number" placeholder="2500" value={calories} onChange={e => setCalories(e.target.value)} />
              </div>
              <div className="field">
                <label>Protein (g)</label>
                <input type="number" placeholder="180" value={protein} onChange={e => setProtein(e.target.value)} />
              </div>
              <div className="field">
                <label>Notes</label>
                <input type="text" placeholder="Optional" value={notes} onChange={e => setNotes(e.target.value)} />
              </div>
            </div>
            <button className="btn" onClick={submit} disabled={loading || !calories || !protein} style={{ width: '100%' }}>
              {loading ? <span className="spinner"></span> : 'Log'}
            </button>
          </div>

          {targetCals && (
            <>
              {/* Daily budget feedback */}
              <div className="card" style={{ textAlign: 'center', padding: '16px 24px' }}>
                {todayLogs.length > 0 ? (
                  <div style={{ fontSize: 15 }}>
                    {nt?.rmr_adapted ? (
                      <div style={{ fontSize: 13, color: '#999', marginBottom: 6 }}>
                        Budget: {nt.rmr_adapted.toLocaleString()} {nt.is_cutting ? '(adapted RMR)' : '(RMR)'}
                        {nt.workout_calories > 0 && <span> + {nt.workout_calories.toLocaleString()} (workout)</span>}
                        {' = '}<strong className="mono">{targetCals.toLocaleString()}</strong>
                      </div>
                    ) : null}
                    <span>You ate <strong className="mono">{todayCals.toLocaleString()}</strong> cal. </span>
                    {todayCals > targetCals ? (
                      <span className="red">{(todayCals - targetCals).toLocaleString()} cal over budget.</span>
                    ) : (
                      <span className="green">{(targetCals - todayCals).toLocaleString()} cal remaining.</span>
                    )}
                    <div style={{ fontSize: 13, color: '#999', marginTop: 4 }}>
                      Protein: {todayProtein}g / {targetProtein}g ({targetProtein > 0 ? Math.round(todayProtein / targetProtein * 100) : 0}%)
                    </div>
                  </div>
                ) : (
                  <div style={{ fontSize: 15, color: '#888' }}>
                    Budget: {targetCals.toLocaleString()} cal. No meals logged yet.
                  </div>
                )}
                {nt?.target_source === 'custom' && (
                  <div style={{ fontSize: 12, marginTop: 8, color: '#666' }}>Custom calorie target override</div>
                )}
              </div>

              {/* Budget breakdown */}
              {nt?.rmr && (
                <div className="card" style={{ padding: '16px 20px' }}>
                  <div style={{ fontSize: 11, color: '#00F19F', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 10 }}>Your Daily Budget</div>
                  <div style={{ display: 'grid', gridTemplateColumns: nt.workout_calories > 0 ? 'repeat(3, 1fr)' : 'repeat(2, 1fr)', gap: 8, textAlign: 'center', marginBottom: 12 }}>
                    <div>
                      <div className="mono" style={{ fontSize: 18, fontWeight: 700 }}>{nt.rmr_adapted.toLocaleString()}</div>
                      <div className="dim text-sm">{nt.is_cutting ? 'Adapted RMR' : 'RMR'}</div>
                    </div>
                    {nt.workout_calories > 0 && (
                      <div>
                        <div className="mono" style={{ fontSize: 18, fontWeight: 700 }}>+{nt.workout_calories.toLocaleString()}</div>
                        <div className="dim text-sm">Workout</div>
                      </div>
                    )}
                    <div>
                      <div className="mono" style={{ fontSize: 18, fontWeight: 700, color: '#00F19F' }}>{nt.daily_budget.toLocaleString()}</div>
                      <div className="dim text-sm">Budget</div>
                    </div>
                  </div>
                  {nt.workout_calories === 0 && (
                    <div style={{ fontSize: 12, color: '#666', textAlign: 'center' }}>Workout calories update after Whoop syncs</div>
                  )}
                  {nt.is_cutting && (
                    <div style={{ fontSize: 12, color: '#999', textAlign: 'center', marginTop: 4 }}>RMR adapted -10% for active cut ({nt.rmr.toLocaleString()} base)</div>
                  )}
                </div>
              )}
              {nt?.warning && !nt?.rmr && (
                <div className="card" style={{ textAlign: 'center', padding: '12px 20px', fontSize: 13, color: '#FF8C00' }}>
                  {nt.warning}
                </div>
              )}

              {/* Progress bars */}
              <div className="two-col">
                <div className="card">
                  <div className="card-header"><h2>CALORIES TODAY</h2></div>
                  <div style={{ textAlign: 'center', marginBottom: 12 }}>
                    <span className="mono" style={{ fontSize: 32, fontWeight: 700 }}>{todayCals}</span>
                    <span className="dim" style={{ fontSize: 14 }}> / {targetCals}</span>
                  </div>
                  <div className="progress-bar">
                    <div className="progress-fill" style={{ width: Math.min(todayCals / targetCals * 100, 100) + '%', background: todayCals > targetCals ? '#FF4D4D' : '#00F19F' }}></div>
                  </div>
                </div>
                <div className="card">
                  <div className="card-header"><h2>PROTEIN TODAY</h2></div>
                  <div style={{ textAlign: 'center', marginBottom: 12 }}>
                    <span className="mono" style={{ fontSize: 32, fontWeight: 700 }}>{todayProtein}g</span>
                    <span className="dim" style={{ fontSize: 14 }}> / {targetProtein}g</span>
                  </div>
                  <div className="progress-bar">
                    <div className="progress-fill" style={{ width: Math.min(todayProtein / targetProtein * 100, 100) + '%', background: todayProtein >= targetProtein ? '#00F19F' : '#FFD600' }}></div>
                  </div>
                </div>
              </div>
            </>
          )}

          {avgCals7d != null && (
            <div className="card" style={{ marginTop: 16 }}>
              <div className="card-header"><h2>7-DAY AVERAGES</h2></div>
              <div className="metric-row">
                <span className="metric-label">Avg Daily Calories</span>
                <span className="metric-value">{avgCals7d}</span>
              </div>
              <div className="metric-row">
                <span className="metric-label">Avg Daily Protein</span>
                <span className="metric-value">{avgProtein7d}g</span>
              </div>
              <div className="metric-row">
                <span className="metric-label">Days Logged (7d)</span>
                <span className="metric-value">{uniqueDays7d.length} / 7</span>
              </div>
              {proteinCompliance != null && (
                <div className="metric-row">
                  <span className="metric-label">Protein Compliance</span>
                  <span className={'metric-value ' + (proteinCompliance >= 80 ? 'green' : proteinCompliance >= 50 ? 'yellow' : 'red')}>
                    {proteinCompliance}%
                  </span>
                </div>
              )}
            </div>
          )}

    function BodyCompTab({ profile }) {
      const [entries, setEntries] = useState([]);
      const [weight, setWeight] = useState('');
      const [bf, setBf] = useState('');
      const [photoFile, setPhotoFile] = useState(null);
      const [photoPreview, setPhotoPreview] = useState(null);
      const [viewingPhoto, setViewingPhoto] = useState(null);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        api('/api/body-comp').then(setEntries).catch(console.error);
      }, []);

      const handlePhotoSelect = (e) => {
        const file = e.target.files[0];
        if (!file) { setPhotoFile(null); setPhotoPreview(null); return; }
        if (file.size > 10 * 1024 * 1024) { alert('Photo must be under 10MB'); return; }
        setPhotoFile(file);
        const reader = new FileReader();
        reader.onload = (ev) => setPhotoPreview(ev.target.result);
        reader.readAsDataURL(file);
      };

      const fileToBase64 = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      const submit = async () => {
        if (!weight) return;
        setLoading(true);
        try {
          const payload = { weight_lbs: parseFloat(weight), body_fat_pct: bf ? parseFloat(bf) : undefined, date: getLocalDateString() };
          if (photoFile) {
            payload.photo_base64 = await fileToBase64(photoFile);
          }
          await api('/api/body-comp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          setWeight(''); setBf(''); setPhotoFile(null); setPhotoPreview(null);
          api('/api/body-comp').then(setEntries).catch(console.error);
        } catch (e) { console.error(e); }
        setLoading(false);
      };

      const deleteEntry = async (id) => {
        await api(`/api/body-comp/${id}`, { method: 'DELETE' });
        setEntries(entries.filter(e => e.id !== id));
      };

      const latest = entries[0];
      const goalWeight = profile?.goal_weight_lbs;
      const goalBf = profile?.goal_body_fat_pct;

      // Compute weekly weight trend from entries
      const weightTrend = (() => {
        if (entries.length < 2) return null;
        const sorted = [...entries].reverse();
        const latest = sorted[sorted.length - 1];
        const weekAgo = getLocalDateString(new Date(Date.now() - 7 * 86400000));
        const older = sorted.find(e => e.date <= weekAgo);
        if (!older) return null;
        const daysDiff = (new Date(latest.date) - new Date(older.date)) / 86400000;
        if (daysDiff < 3) return null;
        return ((latest.weight_lbs - older.weight_lbs) / daysDiff * 7).toFixed(1);
      })();

      // Projected weeks to goal
      const weeksToWeightGoal = (() => {
        if (!goalWeight || !latest || !weightTrend || parseFloat(weightTrend) >= 0) return null;
        const remaining = latest.weight_lbs - goalWeight;
        if (remaining <= 0) return 0;
        const weeklyLoss = Math.abs(parseFloat(weightTrend));
        if (weeklyLoss < 0.1) return null;
        return Math.round(remaining / weeklyLoss);
      })();

      const weeksToBfGoal = (() => {
        if (!goalBf || !latest?.body_fat_pct) return null;
        const remaining = latest.body_fat_pct - goalBf;
        if (remaining <= 0) return 0;
        // Assume ~0.5% BF loss per week with proper deficit
        return Math.round(remaining / 0.5);
      })();

      return (
        <>
          <div className="card">
            <div className="card-header"><h2 className="green">LOG BODY COMP</h2></div>
            <div className="form-grid-2" style={{ marginBottom: 12 }}>
              <div className="field">
                <label>Weight (lbs)</label>
                <input type="number" step="0.1" placeholder="196.4" value={weight} onChange={e => setWeight(e.target.value)} />
              </div>
              <div className="field">
                <label>Body Fat % (optional)</label>
                <input type="number" step="0.1" placeholder="20.1" value={bf} onChange={e => setBf(e.target.value)} />
              </div>
            </div>
            <div style={{ marginBottom: 12 }}>
              <label style={{ display: 'block', fontSize: 11, letterSpacing: 1, textTransform: 'uppercase', color: '#666', marginBottom: 6 }}>Progress Photo (optional)</label>
              <input type="file" accept="image/jpeg,image/png" onChange={handlePhotoSelect}
                style={{ fontSize: 13, color: '#888' }} />
              {photoPreview && (
                <div style={{ marginTop: 8 }}>
                  <img src={photoPreview} alt="Preview" style={{ maxHeight: 120, borderRadius: 8, border: '1px solid #2A2A2A' }} />
                  <button className="btn-sm btn-outline" onClick={() => { setPhotoFile(null); setPhotoPreview(null); }}
                    style={{ marginLeft: 8, padding: '2px 8px', fontSize: 11, color: '#FF4D4D', borderColor: '#FF4D4D40' }}>Remove</button>
                </div>
              )}
            </div>
            <button className="btn" onClick={submit} disabled={loading || !weight} style={{ width: '100%' }}>
              {loading ? <span className="spinner"></span> : 'Log'}
            </button>
          </div>

          {latest && (
            <div className="two-col">
              <div className="card">
                <div className="card-header"><h2>CURRENT WEIGHT</h2></div>
                <div style={{ textAlign: 'center' }}>
                  <span className="mono" style={{ fontSize: 36, fontWeight: 700 }}>{latest.weight_lbs}</span>
                  <span className="dim"> lbs</span>
                </div>
                {weightTrend && (
                  <div style={{ textAlign: 'center', marginTop: 6 }}>
                    <span className={'mono text-sm ' + (parseFloat(weightTrend) <= 0 ? 'green' : 'red')}>
                      {parseFloat(weightTrend) > 0 ? '+' : ''}{weightTrend} lbs/week
                    </span>
                  </div>
                )}
                {goalWeight && (
                  <div style={{ textAlign: 'center', marginTop: 6 }}>
                    <span className="dim text-sm">Goal: {goalWeight} lbs</span>
                    {weeksToWeightGoal != null && weeksToWeightGoal > 0 && (
                      <span className="dim text-sm"> (~{weeksToWeightGoal} weeks)</span>
                    )}
                    {weeksToWeightGoal === 0 && <span className="green text-sm"> — Goal reached!</span>}
                  </div>
                )}
              </div>
              <div className="card">
                <div className="card-header"><h2>BODY FAT</h2></div>
                <div style={{ textAlign: 'center' }}>
                  <span className="mono" style={{ fontSize: 36, fontWeight: 700 }}>{latest.body_fat_pct != null ? latest.body_fat_pct + '%' : '\u2014'}</span>
                </div>
                {goalBf && (
                  <div style={{ textAlign: 'center', marginTop: 8 }}>
                    <span className="dim text-sm">Goal: {goalBf}%</span>
                    {weeksToBfGoal != null && weeksToBfGoal > 0 && (
                      <span className="dim text-sm"> (~{weeksToBfGoal} weeks)</span>
                    )}
                    {weeksToBfGoal === 0 && <span className="green text-sm"> — Goal reached!</span>}
                  </div>
                )}
              </div>
            </div>
          )}

          {entries.length >= 2 && (
            <div className="card" style={{ marginTop: 16 }}>
              <div className="card-header"><h2>TREND</h2><span className="text-sm dim">{entries.length} entries</span></div>
              <BodyCompChart entries={entries} />
            </div>
          )}

          <div className="card" style={{ marginTop: 16 }}>
            <div className="card-header"><h2>HISTORY</h2></div>
            {entries.slice(0, 20).map(e => (
              <div key={e.id} className="metric-row">
                <span className="metric-label">{e.date}</span>
                <span className="mono" style={{ fontSize: 13 }}>
                  {e.weight_lbs} lbs{e.body_fat_pct != null ? ` / ${e.body_fat_pct}% BF` : ''}
                  {e.has_photo && (
                    <button onClick={() => setViewingPhoto(`/api/body-comp/${e.id}/photo`)}
                      style={{ background: 'none', border: 'none', color: '#00F19F', cursor: 'pointer', marginLeft: 8, fontSize: 12 }}>
                      View Photo
                    </button>
                  )}
                </span>
                <button className="btn-sm btn-outline" onClick={() => deleteEntry(e.id)} style={{ marginLeft: 8, padding: '2px 8px', fontSize: 11, color: '#FF4D4D', borderColor: '#FF4D4D40' }}>x</button>
              </div>
            ))}
            {entries.length === 0 && <div className="dim">No entries yet</div>}
          </div>

          {viewingPhoto && (
            <div onClick={() => setViewingPhoto(null)}
              style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.85)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000, cursor: 'pointer' }}>
              <img src={viewingPhoto} alt="Progress photo" style={{ maxWidth: '90vw', maxHeight: '90vh', borderRadius: 12 }} />
            </div>
          )}
        </>
      );
    }

    // ── Longevity Tab ─────────────────────────────────────────────
    function BioTrendChart({ data, label, color, unit, lowerIsBetter }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      useEffect(() => {
        if (!data || data.length < 2) return;
        if (chartRef.current) chartRef.current.destroy();
        const ctx = canvasRef.current.getContext('2d');
        chartRef.current = new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.map(d => d.date),
            datasets: [{
              label: label,
              data: data.map(d => d.value),
              borderColor: color,
              backgroundColor: color + '15',
              fill: true,
              tension: 0.3,
              pointRadius: 4,
              pointHoverRadius: 7,
              pointHitRadius: 20,
              pointBackgroundColor: color,
              borderWidth: 2,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'nearest', axis: 'x', intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: { backgroundColor: '#1A1A1A', titleColor: '#FFF', bodyColor: '#CCC', borderColor: '#2A2A2A', borderWidth: 1, padding: 12,
                callbacks: { label: ctx => ` ${label}: ${ctx.parsed.y}${unit}` } },
            },
            scales: {
              x: { ticks: { color: '#444', maxTicksLimit: 6, font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#1A1A1A' } },
              y: { ticks: { color: color + '80', font: { family: 'JetBrains Mono', size: 11 } }, grid: { color: '#1A1A1A' } },
            },
          },
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [data]);
      if (!data || data.length < 2) return null;
      // Compute trend
      const first5 = data.slice(0, Math.min(5, data.length));
      const last5 = data.slice(-Math.min(5, data.length));
      const avgFirst = first5.reduce((s, d) => s + d.value, 0) / first5.length;
      const avgLast = last5.reduce((s, d) => s + d.value, 0) / last5.length;
      const diff = avgLast - avgFirst;
      const improving = lowerIsBetter ? diff < 0 : diff > 0;
      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
            <span className="dim text-sm">{data.length} data points</span>
            <span className={'mono text-sm ' + (Math.abs(diff) < 0.5 ? 'dim' : improving ? 'green' : 'red')}>
              {diff > 0 ? '+' : ''}{diff.toFixed(1)}{unit}
            </span>
          </div>
          <div style={{ height: 200 }}><canvas ref={canvasRef}></canvas></div>
        </div>
      );
    }

          });
        }
      }, [profile]);

      const save = async () => {
        setSaving(true); setSaved(false);
        try {
          const data = {};
          const stringFields = ['sex', 'goal_target_date'];
          Object.entries(form).forEach(([k, v]) => {
            if (v === '' || v == null) return;
            data[k] = stringFields.includes(k) ? v : Number(v);
          });
          if (form.sex === '') data.sex = null;
          await api('/api/profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
          });
          setSaved(true);
          if (onSave) onSave();
          setTimeout(() => setSaved(false), 2000);
        } catch (e) { console.error(e); }
        setSaving(false);
      };

      const f = (key) => ({
        value: form[key],
        onChange: e => setForm({ ...form, [key]: e.target.value }),
      });

      // Compute RMR for display if we have enough data
      const weight = parseFloat(form.weight_lbs) || null;
      const heightIn = parseInt(form.height_inches) || null;
      const ageVal = parseInt(form.age) || null;
      const sexVal = form.sex || null;
      let estimatedRmr = null;
      if (weight && heightIn && ageVal && sexVal) {
        const wKg = weight / 2.205;
        const hCm = heightIn * 2.54;
        estimatedRmr = Math.round((10 * wKg) + (6.25 * hCm) - (5 * ageVal) + (sexVal === 'male' ? 5 : -161));
      }
      const autoProtein = weight ? Math.max(Math.round(weight * 1.0), 150) : null;

      return (
        <div className="card">
          <div className="card-header"><h2 className="green">PROFILE & GOALS</h2></div>

          <h3 style={{ fontSize: 13, color: '#888', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 12 }}>Body</h3>
          <div className="form-grid-3" style={{ marginBottom: 20 }}>
            <div className="field"><label>Age</label><input type="number" placeholder="34" {...f('age')} /></div>
            <div className="field">
              <label>Sex</label>
              <select {...f('sex')}>
                <option value="">—</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
              </select>
            </div>
            <div className="field"><label>Height (inches)</label><input type="number" placeholder="73" {...f('height_inches')} /></div>
            <div className="field"><label>Weight (lbs)</label><input type="number" step="0.1" placeholder="200" {...f('weight_lbs')} /></div>
            <div className="field"><label>Max HR</label><input type="number" placeholder="Auto from age" {...f('max_hr')} /></div>
            <div className="field"><label>Body Fat %</label><input type="number" step="0.1" placeholder="22" {...f('body_fat_pct')} /></div>
            <div className="field"><label>RMR (cal/day)</label><input type="number" placeholder={estimatedRmr ? `${estimatedRmr} est.` : '1800'} {...f('rmr_override')} /></div>
          </div>

          <h3 style={{ fontSize: 13, color: '#888', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 12 }}>Goals</h3>
          <div className="form-grid-3" style={{ marginBottom: 20 }}>
            <div className="field"><label>Marathon Time (min)</label><input type="number" placeholder="180" {...f('goal_marathon_time_min')} /></div>
            <div className="field"><label>Target Body Fat %</label><input type="number" step="0.1" placeholder="16" {...f('goal_body_fat_pct')} /></div>
            <div className="field"><label>Target Weight (lbs)</label><input type="number" step="0.1" placeholder="185" {...f('goal_weight_lbs')} /></div>
            <div className="field"><label>Target Date</label><input type="date" {...f('goal_target_date')} /></div>
          </div>

          <h3 style={{ fontSize: 13, color: '#888', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 12 }}>Nutrition Targets</h3>
          <div style={{ fontSize: 12, color: '#666', marginBottom: 12 }}>
            Your daily budget = RMR + workout calories. Leave blank to auto-calculate.
          </div>
          <div className="form-grid-2" style={{ marginBottom: 20 }}>
            <div className="field"><label>Daily Calorie Override</label><input type="number" placeholder="Leave blank for auto" {...f('goal_calorie_target')} /></div>
            <div className="field"><label>Daily Protein Target (g)</label><input type="number" placeholder={autoProtein ? `Auto: ${autoProtein}` : '180'} {...f('goal_protein_target_grams')} /></div>
          </div>

          <button className="btn" onClick={save} disabled={saving} style={{ width: '100%' }}>
            {saving ? <span className="spinner"></span> : saved ? 'Saved!' : 'Save Profile'}
          </button>

          {withingsStatus?.configured && (
            <div style={{ marginTop: 20, padding: '16px 20px', background: '#111', borderRadius: 8, border: '1px solid #1E1E1E' }}>
              <div style={{ fontSize: 11, color: '#00BFFF', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 10 }}>Withings Smart Scale</div>
              {withingsStatus.connected ? (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ color: '#00F19F', fontSize: 18 }}>&#10003;</span>
                  <span style={{ color: '#CCC', fontSize: 14 }}>Connected — weight syncs automatically</span>
                </div>
              ) : (
                <div>
                  <div style={{ color: '#888', fontSize: 13, marginBottom: 10 }}>Connect your Withings scale to auto-sync weight data.</div>
                  <button className="btn btn-sm" onClick={() => { window.location.href = '/api/withings/auth'; }} style={{ background: '#00BFFF', color: '#000' }}>
                    Connect Withings
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────

    function App() {
      const [tab, setTab] = useState('dashboard');
      const [runs, setRuns] = useState([]);
      const [recovery, setRecovery] = useState(null);
      const [shoes, setShoes] = useState([]);
      const [trends, setTrends] = useState([]);
      const [snapshot, setSnapshot] = useState(null);
      const [briefing, setBriefing] = useState(null);
      const [profile, setProfile] = useState(null);
      const [weeklyScorecard, setWeeklyScorecard] = useState(null);
      const [weeklyPlan, setWeeklyPlan] = useState(null);

      const loadAll = useCallback(() => {
        const ld = getLocalDateString();
        Promise.allSettled([
          api('/api/runs').then(setRuns),
          api('/api/recovery/today').then(setRecovery),
          api('/api/shoes').then(setShoes),
          api('/api/trends').then(setTrends),
          api('/api/snapshot').then(setSnapshot),
          api(`/api/briefing?local_date=${ld}`).then(setBriefing),
          api('/api/profile').then(setProfile),
          api(`/api/weekly-scorecard?local_date=${ld}`).then(r => { if (!r.error) setWeeklyScorecard(r); }).catch(() => {}),
          api(`/api/weekly-plan?local_date=${ld}`).then(r => { if (!r.error) setWeeklyPlan(r); }).catch(() => {}),
        ]).catch(() => {});
      }, []);

      useEffect(() => { loadAll(); }, [loadAll]);

      return (
        <div>
          <Header tab={tab} setTab={setTab} />

          {!profile && tab === 'dashboard' && (
            <div className="profile-banner">
              <span className="msg">Set up your profile to unlock personalized coaching, VO2 max, and nutrition targets.</span>
              <button className="btn btn-sm" onClick={() => setTab('settings')}>Set Up Profile</button>
            </div>
          )}

          {tab === 'dashboard' && (
            <>
              <WeeklyScorecardCard scorecard={weeklyScorecard} />
              <TodayWorkoutCard plan={weeklyPlan} recovery={recovery} />
              <WeekOverviewStrip plan={weeklyPlan} runs={runs} />
              <MorningBriefing briefing={briefing} />
              <LogRunCard onLogged={loadAll} />
              <div className="two-col">
                <ShoeTracker shoes={shoes} />
                <SnapshotCard snapshot={snapshot} recovery={recovery} />
              </div>
              <TrendChart trends={trends} />
              <RecentRuns runs={runs} />
            </>
          )}

          {tab === 'nutrition' && <NutritionTab profile={profile} briefing={briefing} />}
          {tab === 'body' && <BodyCompTab profile={profile} />}
          {tab === 'longevity' && <LongevityTab setTab={setTab} />}
          {tab === 'settings' && <SettingsTab profile={profile} onSave={loadAll} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
